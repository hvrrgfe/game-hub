<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>飞机大战 - Aircraft Battle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:"Microsoft YaHei","Segoe UI",sans-serif;
  overflow:hidden;
}
#game-wrapper{
  position:relative;
  border:2px solid rgba(255,255,255,0.1);
  border-radius:8px;
  box-shadow:0 0 40px rgba(0,100,255,0.2);
}
canvas{display:block;background:#1e1e28;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
#back-btn{
  position:fixed;top:16px;left:16px;
  color:rgba(255,255,255,0.4);
  text-decoration:none;font-size:14px;
  padding:6px 14px;border-radius:6px;
  background:rgba(255,255,255,0.05);
  transition:all 0.2s;
  z-index:10;
}
#back-btn:hover{color:#fff;background:rgba(255,255,255,0.12)}
</style>
</head>
<body>
<a id="back-btn" href="../">← 返回游戏中心</a>
<div id="game-wrapper">
  <canvas id="gameCanvas" width="480" height="700"></canvas>
</div>
<script src="game.js"></script>
<div id="play-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;cursor:pointer;">
  <div style="font-size:64px;margin-bottom:16px;">&#9992;&#65039;</div>
  <div style="color:#fff;font-size:24px;font-weight:bold;margin-bottom:8px;">飞机大战</div>
  <div style="color:#888;font-size:14px;margin-bottom:24px;">点击屏幕开始</div>
  <div style="color:#3cf;font-size:40px;animation:pulse 1.5s ease-in-out infinite;">▶</div>
  <style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}</style>
</div>
<script>
document.getElementById("play-overlay").addEventListener("click", function() {
  this.style.display = "none";
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  ctx.resume();
});
</script>
</body>
</html>
